# Fly.io config for the Ozigi LinkedIn Playwright worker.
# Deploy from this directory:
#
#   cd workers/linkedin
#   fly apps create ozigi-linkedin-worker   # once, to register the app name
#   fly secrets set NEXT_PUBLIC_SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=... GTM_ENCRYPTION_KEY=...
#   fly deploy

app = "ozigi-linkedin-worker"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  BROWSER_PROFILES_DIR = "/data/linkedin-profiles"
  # Residential proxy — set via fly secrets (never commit credentials):
  #   fly secrets set PROXY_SERVER=geo.iproyal.com:12321 PROXY_USERNAME=... PROXY_PASSWORD=...
  # PROXY_SERVER must be host:port only (no http://) — the code builds the full URL

# Persistent volume so browser profiles survive container restarts.
# Create once with: fly volumes create linkedin_profiles --region lax --size 5
[[mounts]]
  source = "linkedin_profiles"
  destination = "/data"

# Keep exactly one instance running at all times — this is a persistent worker
[[vm]]
  memory = "2gb"     # Chromium + Xvfb + stealth plugin — bumped from 1gb 2026-07-21 after
                     # the kernel OOM-killed chrome (repeatedly) and the worker sat dead
                     # for 5 days with no auto-recovery. See [[restart]] below for the other
                     # half of that fix.
  cpu_kind = "shared"
  cpus = 1

# Auto-restart the machine if the worker process ever exits/crashes (e.g. Chrome
# getting OOM-killed and taking the whole Node process down with it, or the
# in-process poll watchdog calling process.exit(1)). Before this was added the
# machine had no restart policy at all — a crash just sat dead until someone
# noticed the queue had stopped moving.
[[restart]]
  policy = "on-failure"
  max_retries = 5

[http_service]
  internal_port = 8080
  force_https = false   # internal worker, no public HTTPS needed
  auto_stop_machines = false   # never stop — must stay running to poll queue
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/"
