    <text x="444" y="88" fill="#4ade80" font-size="10" font-weight="700">ISSUE 9</text>
    <text x="444" y="108" fill="#e2e8f0" font-size="12" font-weight="600">The Framework</text>

    <rect x="576" y="68" width="136" height="56" rx="8" fill="#284f1c"/>
    <text x="588" y="88" fill="#4ade80" font-size="10" font-weight="700">ISSUE 10</text>
    <text x="588" y="108" fill="#e2e8f0" font-size="12" font-weight="600">State of</text>
