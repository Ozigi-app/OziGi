  <text x="950" y="250" fill="#e2e8f0" font-size="11">→ Easy to write first</text>
  <text x="950" y="274" fill="#e2e8f0" font-size="11">→ Builds reader trust</text>
  <text x="950" y="298" fill="#e2e8f0" font-size="11">→ Signal before opinions</text>
  <text x="950" y="322" fill="#e2e8f0" font-size="11">→ Framework as payoff</text>
  <text x="950" y="346" fill="#4ade80" font-size="11">✓ Cadence that sticks</text>
