    <text x="12" y="88" fill="#f59e0b" font-size="10" font-weight="700">ISSUE 6</text>
    <text x="12" y="108" fill="#e2e8f0" font-size="12" font-weight="600">Reader Question</text>

    <rect x="144" y="68" width="136" height="56" rx="8" fill="#1e293b"/>
    <text x="156" y="88" fill="#f59e0b" font-size="10" font-weight="700">ISSUE 7</text>
    <text x="156" y="108" fill="#e2e8f0" font-size="12" font-weight="600">Contrarian Take</text>

