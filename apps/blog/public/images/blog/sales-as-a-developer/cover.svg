<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </linearGradient>
    <radialGradient id="glow" cx="73%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.17"/>
      <stop offset="100%" stop-color="#E8320A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="22%" r="30%">
      <stop offset="0%" stop-color="#1E4A8A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <line x1="580" y1="70"  x2="1160" y2="70"/>
    <line x1="580" y1="150" x2="1160" y2="150"/>
    <line x1="580" y1="230" x2="1160" y2="230"/>
    <line x1="580" y1="310" x2="1160" y2="310"/>
    <line x1="580" y1="390" x2="1160" y2="390"/>
    <line x1="580" y1="470" x2="1160" y2="470"/>
    <line x1="580" y1="550" x2="1160" y2="550"/>
    <line x1="630"  y1="40" x2="630"  y2="590"/>
    <line x1="710"  y1="40" x2="710"  y2="590"/>
    <line x1="790"  y1="40" x2="790"  y2="590"/>
    <line x1="870"  y1="40" x2="870"  y2="590"/>
    <line x1="950"  y1="40" x2="950"  y2="590"/>
    <line x1="1030" y1="40" x2="1030" y2="590"/>
    <line x1="1110" y1="40" x2="1110" y2="590"/>
  </g>

  <!-- Before / After comparison -->
  <text x="660" y="94" font-family="'DM Sans','Inter',monospace" font-size="11" font-weight="700" fill="#E8320A" letter-spacing="1">❌  TRADITIONAL SALES (what devs hate)</text>
  <rect x="660" y="104" width="480" height="106" rx="6" fill="#1A2540" stroke="#E8320A" stroke-width="1" opacity="0.6"/>
  <text x="680" y="126" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#94A3B8">Pressure tactics · manufactured urgency</text>
  <text x="680" y="146" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#94A3B8">Fake enthusiasm · "I'd love to connect"</text>
  <text x="680" y="166" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#94A3B8">Vague claims · overselling · dodge objections</text>
  <text x="680" y="186" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#94A3B8">Calendar link in message #1</text>
  <rect x="1090" y="114" width="32" height="86" rx="4" fill="rgba(232,50,10,0.08)"/>
  <text x="1106" y="162" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#E8320A" writing-mode="tb">AVOID</text>

  <text x="660" y="232" font-family="'DM Sans','Inter',monospace" font-size="11" font-weight="700" fill="#16a34a" letter-spacing="1">✓  DEVELOPER SALES (debugging mindset)</text>
  <rect x="660" y="242" width="480" height="106" rx="6" fill="#1A2540" stroke="#16a34a" stroke-width="1"/>
  <text x="680" y="264" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#FAFAFA">Get curious about their problem first</text>
  <text x="680" y="284" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#FAFAFA">Specific + honest about what you do and don't do</text>
  <text x="680" y="304" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#FAFAFA">Help even with no sale in sight</text>
  <text x="680" y="324" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#FAFAFA">Show → don't tell · let the free tier convince</text>
  <rect x="1090" y="252" width="32" height="86" rx="4" fill="rgba(22,163,74,0.08)"/>
  <text x="1106" y="302" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#16a34a" writing-mode="tb">WORKS</text>

  <!-- First conversation debug view -->
  <rect x="660" y="366" width="480" height="82" rx="8" fill="#0F1828" stroke="#1E293B" stroke-width="1"/>
  <text x="680" y="388" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">FIRST CONVERSATION (treat like a debug session)</text>
  <text x="680" y="410" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#FAFAFA">1.  Ask what they use now and what hurts</text>
  <text x="680" y="428" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#FAFAFA">2.  Repeat problem back to confirm understanding</text>
  <text x="680" y="446" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#94A3B8">3.  Be direct — say yes OR no. Then show your fit.</text>

  <!-- Circuit traces -->
  <g fill="none" stroke="#1E3A5F" stroke-width="1.5" opacity="0.5">
    <path d="M710 470 L710 550 L790 550"/>
    <path d="M950 470 L950 550 L1030 550 L1030 470"/>
    <path d="M1110 470 L1110 550"/>
  </g>
  <g fill="#E8320A" opacity="0.85"><circle cx="1030" cy="470" r="4"/></g>
  <g fill="none" stroke="#E8320A" stroke-width="1" opacity="0.3"><circle cx="1030" cy="470" r="11"/></g>
  <g fill="#1E3A5F" opacity="0.9">
    <circle cx="790" cy="550" r="4"/>
    <circle cx="1110" cy="550" r="4"/>
  </g>

  <!-- Left side text -->
  <rect x="80" y="88" width="112" height="30" rx="6" fill="#E8320A"/>
  <text x="136" y="108" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#FAFAFA" letter-spacing="1">MARKETING</text>
  <text x="206" y="108" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" letter-spacing="2">·  JUNE 2026</text>

  <text x="80" y="200" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="66" font-weight="800" fill="#FAFAFA">Sales as a</text>
  <text x="80" y="278" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="66" font-weight="800" fill="#E8320A">Developer</text>

  <text x="80" y="335" font-family="'DM Sans','Inter',sans-serif" font-size="22" fill="#94A3B8">Drop the tactics.</text>
  <text x="80" y="363" font-family="'DM Sans','Inter',sans-serif" font-size="22" fill="#94A3B8">Debug the problem instead.</text>

  <line x1="80" y1="394" x2="460" y2="394" stroke="#1E293B" stroke-width="1"/>

  <rect x="80"  y="410" width="144" height="36" rx="18" fill="#1E293B"/>
  <text x="152" y="433" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">no pressure tactics</text>
  <rect x="236" y="410" width="110" height="36" rx="18" fill="#1E293B"/>
  <text x="291" y="433" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">founder-led</text>
  <rect x="358" y="410" width="110" height="36" rx="18" fill="#1E293B"/>
  <text x="413" y="433" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">debug mindset</text>

  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>

  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>
</svg>
