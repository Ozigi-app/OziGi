  <rect x="640" y="382" width="520" height="40" rx="6" fill="#0A1628" stroke="#1E293B" stroke-width="1"/>
  <text x="656" y="397" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">SOUNDS HUMAN</text>
  <text x="656" y="413" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Hootsuite / Buffer / SocialBee</text>
  <rect x="960" y="388" width="70" height="22" rx="5" fill="#1E293B"/>
  <text x="995" y="403" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Sometimes</text>
  <rect x="1042" y="388" width="104" height="22" rx="5" fill="#E8320A" opacity="0.15" stroke="#E8320A" stroke-width="1"/>
  <text x="1094" y="403" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#E8320A">Ozigi: Always tries</text>

  <rect x="640" y="430" width="520" height="40" rx="6" fill="#0A1628" stroke="#1E293B" stroke-width="1"/>
  <text x="656" y="445" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">PLATFORM-SPECIFIC FORMAT</text>
  <text x="656" y="461" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Hootsuite / Buffer / SocialBee</text>
  <rect x="960" y="436" width="70" height="22" rx="5" fill="#1E293B"/>
  <text x="995" y="451" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Partial</text>
  <rect x="1042" y="436" width="104" height="22" rx="5" fill="#E8320A" opacity="0.15" stroke="#E8320A" stroke-width="1"/>
  <text x="1094" y="451" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#E8320A">Ozigi: Native</text>

  <rect x="640" y="478" width="520" height="40" rx="6" fill="#0A1628" stroke="#1E293B" stroke-width="1"/>
  <text x="656" y="493" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">BANNED SLOP WORDS</text>
  <text x="656" y="509" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Hootsuite / Buffer / SocialBee</text>
  <rect x="960" y="484" width="70" height="22" rx="5" fill="#1E293B"/>
  <text x="995" y="499" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">None</text>
  <rect x="1042" y="484" width="104" height="22" rx="5" fill="#E8320A" opacity="0.15" stroke="#E8320A" stroke-width="1"/>
  <text x="1094" y="499" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#E8320A">Ozigi: 300+ terms</text>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>

  <!-- Category -->
  <text x="80" y="118" font-family="'DM Sans','Inter',sans-serif" font-size="14" font-weight="600" fill="#E8320A" letter-spacing="3">TOOLS ROUNDUP  ·  2026</text>

  <!-- Title -->
  <text x="80" y="200" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="50" font-weight="800" fill="#FAFAFA">Ozigi vs Hootsuite,</text>
  <text x="80" y="262" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="50" font-weight="800" fill="#FAFAFA">Buffer AI &amp;</text>
  <text x="80" y="324" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="50" font-weight="800" fill="#8B5CF6">SocialBee.</text>

  <!-- Subtitle -->
  <text x="80" y="372" font-family="'DM Sans','Inter',sans-serif" font-size="20" fill="#94A3B8">Which AI tool actually writes</text>
  <text x="80" y="398" font-family="'DM Sans','Inter',sans-serif" font-size="20" fill="#94A3B8">social posts that sound human?</text>

  <line x1="80" y1="426" x2="460" y2="426" stroke="#1E293B" stroke-width="1"/>

  <rect x="80"  y="442" width="130" height="36" rx="18" fill="#1E293B"/>
  <text x="145" y="465" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Tools Roundup</text>
  <rect x="222" y="442" width="130" height="36" rx="18" fill="#1E293B"/>
  <text x="287" y="465" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Social AI focus</text>

  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>
</svg>
