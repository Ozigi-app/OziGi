<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0A1A2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="50%" r="44%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="70%" r="30%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <line x1="580" y1="70"  x2="1160" y2="70"/>
    <line x1="580" y1="160" x2="1160" y2="160"/>
    <line x1="580" y1="250" x2="1160" y2="250"/>
    <line x1="580" y1="340" x2="1160" y2="340"/>
    <line x1="580" y1="430" x2="1160" y2="430"/>
    <line x1="580" y1="520" x2="1160" y2="520"/>
    <line x1="640"  y1="40" x2="640"  y2="590"/>
    <line x1="730"  y1="40" x2="730"  y2="590"/>
    <line x1="820"  y1="40" x2="820"  y2="590"/>
    <line x1="910"  y1="40" x2="910"  y2="590"/>
    <line x1="1000" y1="40" x2="1000" y2="590"/>
    <line x1="1090" y1="40" x2="1090" y2="590"/>
  </g>

  <!-- Circuit traces -->
  <g fill="none" stroke="#1E2A3F" stroke-width="1.5" opacity="0.5">
    <path d="M820 70 L820 160 L910 160"/>
    <path d="M1000 70 L1000 160 L1090 160 L1090 250"/>
    <path d="M640 250 L730 250 L730 340"/>
    <path d="M910 250 L910 340 L1000 340 L1000 430"/>
    <path d="M640 430 L640 520 L730 520"/>
    <path d="M1090 430 L1090 520"/>
  </g>
  <g fill="#1E3A5F" opacity="0.8">
    <circle cx="820"  cy="160" r="4"/>
    <circle cx="730"  cy="340" r="4"/>
    <circle cx="730"  cy="520" r="4"/>
  </g>
  <g fill="#8B5CF6" opacity="0.85">
    <circle cx="1090" cy="250" r="5"/>
    <circle cx="1000" cy="430" r="5"/>
    <circle cx="1090" cy="520" r="5"/>
  </g>
  <g fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.25">
    <circle cx="1090" cy="250" r="13"/>
    <circle cx="1000" cy="430" r="13"/>
    <circle cx="1090" cy="520" r="13"/>
  </g>

  <!-- Platform badges — schedulers, muted -->
  <rect x="640" y="80"  width="130" height="36" rx="8" fill="#1E293B" stroke="#1E3A5F" stroke-width="1"/>
  <text x="705" y="103" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8">OwlyWriter AI</text>

  <rect x="782" y="80"  width="100" height="36" rx="8" fill="#1E293B" stroke="#1E3A5F" stroke-width="1"/>
  <text x="832" y="103" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8">Buffer AI</text>

  <rect x="894" y="80"  width="106" height="36" rx="8" fill="#1E293B" stroke="#1E3A5F" stroke-width="1"/>
  <text x="947" y="103" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8">SocialBee</text>

  <!-- "Scheduler, not a writer" callout -->
  <rect x="640" y="136" width="520" height="48" rx="10" fill="#1E293B"/>
  <rect x="640" y="136" width="5"   height="48" rx="2" fill="#8B5CF6"/>
  <text x="662" y="156" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#8B5CF6" letter-spacing="1">THE PROBLEM</text>
  <text x="662" y="175" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">These tools schedule and repurpose. The AI writes like AI.</text>

