  <rect x="640" y="202" width="520" height="64" rx="10" fill="#1E293B" stroke="#E8320A" stroke-width="1.5"/>
  <rect x="640" y="202" width="5"   height="64" rx="2" fill="#E8320A"/>
  <text x="662" y="228" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="1">OZIGI</text>
  <text x="662" y="248" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Writes social posts that sound like you.</text>
  <text x="662" y="263" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Banned lexicon  ·  Platform-aware  ·  Voice personas</text>

  <!-- Sample post visual — makes it concrete -->
  <rect x="640" y="284" width="520" height="80" rx="8" fill="#070E1C" stroke="#1E293B" stroke-width="1"/>
  <text x="656" y="308" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#94A3B8">// OwlyWriter output</text>
  <text x="656" y="326" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" font-style="italic">"Excited to share our latest update! Check it out 🚀"</text>
  <text x="656" y="344" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#E8320A">// Ozigi output  [lexicon-validated]</text>
  <text x="656" y="358" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#FAFAFA" font-style="italic">"We shipped X. Here's the one thing that changed..."</text>

