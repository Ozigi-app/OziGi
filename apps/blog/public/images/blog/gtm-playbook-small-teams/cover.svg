<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8320A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="18%" cy="20%" r="30%">
      <stop offset="0%" stop-color="#1E4A8A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.45">
    <line x1="580" y1="80"  x2="1160" y2="80"/>
    <line x1="580" y1="160" x2="1160" y2="160"/>
    <line x1="580" y1="240" x2="1160" y2="240"/>
    <line x1="580" y1="320" x2="1160" y2="320"/>
    <line x1="580" y1="400" x2="1160" y2="400"/>
    <line x1="580" y1="480" x2="1160" y2="480"/>
    <line x1="580" y1="560" x2="1160" y2="560"/>
    <line x1="630"  y1="40" x2="630"  y2="590"/>
    <line x1="710"  y1="40" x2="710"  y2="590"/>
    <line x1="790"  y1="40" x2="790"  y2="590"/>
    <line x1="870"  y1="40" x2="870"  y2="590"/>
    <line x1="950"  y1="40" x2="950"  y2="590"/>
    <line x1="1030" y1="40" x2="1030" y2="590"/>
    <line x1="1110" y1="40" x2="1110" y2="590"/>
  </g>

  <!-- Weekly loop diagram — 4 nodes in a cycle -->
  <!-- Connecting arcs (curved lines between nodes) -->
  <g fill="none" stroke="#1E3A5F" stroke-width="2" opacity="0.7">
    <path d="M870 160 Q950 130 1030 160"/>
    <path d="M1030 200 Q1060 280 1030 360"/>
    <path d="M1030 400 Q950 430 870 400"/>
    <path d="M870 360 Q840 280 870 200"/>
  </g>
  <!-- Active arc highlight -->
  <path d="M870 160 Q950 130 1030 160" fill="none" stroke="#E8320A" stroke-width="2" opacity="0.5"/>

  <!-- Node 1: Position -->
  <circle cx="870" cy="180" r="52" fill="#1A2540" stroke="#1E3A5F" stroke-width="1.5"/>
  <text x="870" y="174" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#E8320A" letter-spacing="1">POSITION</text>
  <text x="870" y="192" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#94A3B8">Who is this for?</text>

  <!-- Node 2: Source -->
  <circle cx="1050" cy="280" r="52" fill="#1A2540" stroke="#1E3A5F" stroke-width="1.5"/>
  <text x="1050" y="274" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">SOURCE</text>
  <text x="1050" y="292" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#6B7E99">Find the people</text>

  <!-- Node 3: Outreach -->
  <circle cx="870" cy="380" r="52" fill="#1A2540" stroke="#1E3A5F" stroke-width="1.5"/>
  <text x="870" y="374" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">REACH</text>
  <text x="870" y="392" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#6B7E99">Direct outreach</text>

  <!-- Node 4: Content -->
  <circle cx="690" cy="280" r="52" fill="#1A2540" stroke="#1E3A5F" stroke-width="1.5"/>
  <text x="690" y="274" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">CONTENT</text>
  <text x="690" y="292" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#6B7E99">Build trust</text>

  <!-- Loop arrows (chevrons) -->
  <g fill="#1E3A5F" opacity="0.8">
    <polygon points="960,125 975,135 965,145" />
    <polygon points="1055,340 1045,355 1060,355" />
    <polygon points="780,435 785,420 795,430" />
    <polygon points="685,220 695,210 700,225" />
  </g>
  <!-- Active arrow -->
  <polygon points="960,125 975,135 965,145" fill="#E8320A" opacity="0.7"/>

  <!-- Center label -->
  <text x="870" y="276" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#E8320A" opacity="0.6">WEEKLY</text>
  <text x="870" y="292" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#E8320A" opacity="0.6">LOOP</text>

  <!-- Circuit traces bottom -->
  <g fill="none" stroke="#1E3A5F" stroke-width="1.5" opacity="0.5">
    <path d="M630 480 L630 560 L710 560"/>
    <path d="M950 480 L950 560 L1030 560 L1030 480"/>
    <path d="M1110 480 L1110 560"/>
  </g>
  <g fill="#1E3A5F" opacity="0.9">
    <circle cx="710" cy="560" r="4"/>
    <circle cx="1030" cy="480" r="4"/>
  </g>
  <g fill="#E8320A" opacity="0.85">
    <circle cx="950" cy="560" r="5"/>
  </g>
  <g fill="none" stroke="#E8320A" stroke-width="1" opacity="0.3">
    <circle cx="950" cy="560" r="12"/>
  </g>

  <!-- Left side text -->
  <rect x="80" y="88" width="112" height="30" rx="6" fill="#E8320A"/>
  <text x="136" y="108" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#FAFAFA" letter-spacing="1">MARKETING</text>
  <text x="206" y="108" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" letter-spacing="2">·  JUNE 2026</text>

  <text x="80" y="200" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="74" font-weight="800" fill="#FAFAFA">GTM for</text>
  <text x="80" y="285" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="74" font-weight="800" fill="#E8320A">Solo Founders</text>
  <text x="80" y="350" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="36" font-weight="800" fill="#FAFAFA">&amp; Small Teams</text>

  <text x="80" y="406" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">A repeatable weekly loop across</text>
  <text x="80" y="438" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">four jobs. No sales team needed.</text>

  <line x1="80" y1="468" x2="460" y2="468" stroke="#1E293B" stroke-width="1"/>

  <rect x="80"  y="484" width="104" height="36" rx="18" fill="#1E293B"/>
  <text x="132" y="507" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">4 jobs</text>
  <rect x="196" y="484" width="130" height="36" rx="18" fill="#1E293B"/>
  <text x="261" y="507" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">weekly loop</text>
  <rect x="338" y="484" width="130" height="36" rx="18" fill="#1E293B"/>
  <text x="403" y="507" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">10 min read</text>

  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>

  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>
</svg>
