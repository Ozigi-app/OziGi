<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Accent strip -->
  <rect x="0" y="0" width="1200" height="6" fill="#10b981"/>
  <!-- Envelope icon background -->
  <rect x="880" y="80" width="260" height="180" rx="16" fill="#10b98118"/>
  <rect x="880" y="80" width="260" height="180" rx="16" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Envelope flap -->
  <polyline points="880,80 1010,165 1140,80" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Envelope bottom lines -->
  <line x1="900" y1="210" x2="970" y2="160" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="1120" y1="210" x2="1050" y2="160" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Open rate badge -->
  <rect x="920" y="290" width="170" height="56" rx="12" fill="#10b98122"/>
  <text x="1005" y="315" fill="#10b981" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">AVG OPEN RATE</text>
  <text x="1005" y="337" fill="#10b981" font-size="18" font-weight="800" text-anchor="middle">60%+</text>
  <!-- Tag -->
  <rect x="60" y="64" width="160" height="30" rx="6" fill="#10b98122"/>
  <text x="140" y="84" fill="#10b981" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1.5">NEWSLETTER</text>
  <!-- Headline -->
  <text x="60" y="160" fill="#ffffff" font-size="52" font-weight="800" dominant-baseline="middle">5 Newsletter</text>
  <text x="60" y="222" fill="#ffffff" font-size="52" font-weight="800" dominant-baseline="middle">Welcome Email</text>
  <text x="60" y="284" fill="#10b981" font-size="52" font-weight="800" dominant-baseline="middle">Examples</text>
  <text x="60" y="336" fill="#94a3b8" font-size="24" font-weight="400" dominant-baseline="middle">That Convert Subscribers in 2026</text>
  <!-- Template list -->
  <g transform="translate(60, 390)">
    <rect width="720" height="44" rx="8" fill="#1e293b"/>
    <text x="16" y="27" fill="#10b981" font-size="12" font-weight="700">01</text>
    <text x="44" y="27" fill="#cbd5e1" font-size="13" font-weight="500">The "First Useful Thing" Welcome · Tactical Newsletters</text>
  </g>
  <g transform="translate(60, 442)">
    <rect width="720" height="44" rx="8" fill="#1e293b"/>
    <text x="16" y="27" fill="#10b981" font-size="12" font-weight="700">02</text>
    <text x="44" y="27" fill="#cbd5e1" font-size="13" font-weight="500">The "Story and Context" Welcome · Personal Newsletters</text>
  </g>
  <g transform="translate(60, 494)">
    <rect width="720" height="44" rx="8" fill="#1e293b"/>
    <text x="16" y="27" fill="#10b981" font-size="12" font-weight="700">03</text>
    <text x="44" y="27" fill="#cbd5e1" font-size="13" font-weight="500">The "Curated Path" Welcome · Archive-Heavy Newsletters</text>
  </g>
  <g transform="translate(60, 546)">
    <rect width="360" height="44" rx="8" fill="#1e293b"/>
    <text x="16" y="27" fill="#10b981" font-size="12" font-weight="700">04</text>
    <text x="44" y="27" fill="#cbd5e1" font-size="13" font-weight="500">The "What This Is Not" Welcome</text>
  </g>
  <g transform="translate(430, 546)">
    <rect width="350" height="44" rx="8" fill="#1e293b"/>
    <text x="16" y="27" fill="#10b981" font-size="12" font-weight="700">05</text>
    <text x="44" y="27" fill="#cbd5e1" font-size="13" font-weight="500">The "Reply With One Thing" Welcome</text>
  </g>
  <!-- Ozigi brand -->
  <text x="1140" y="596" fill="#64748b" font-size="13" font-weight="600" text-anchor="end">blog.ozigi.app</text>
