  <text x="812" y="192" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#94A3B8">write the post you wished existed</text>
  <text x="680" y="208" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#FAFAFA">Build in public</text>
  <text x="775" y="208" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#16a34a">✓</text>
  <text x="795" y="208" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#94A3B8">visible process earns more trust than pitch</text>

  <rect x="660" y="226" width="480" height="38" rx="6" fill="#1A2540" stroke="#16a34a" stroke-width="1"/>
