  <text x="760" y="122" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#E8320A">✗</text>
  <text x="780" y="122" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#6B7E99">blocked by 50–60% of developers</text>
  <text x="680" y="138" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#94A3B8">Hype copy</text>
  <text x="760" y="138" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#E8320A">✗</text>
  <text x="780" y="138" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#6B7E99">triggers distrust, reads as a warning sign</text>

  <text x="660" y="166" font-family="'DM Sans','Inter',monospace" font-size="11" font-weight="700" fill="#16a34a" letter-spacing="1">TECHNICAL FOUNDER PLAYBOOK  ← what works</text>
