  <text x="775" y="242" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#16a34a">✓</text>
  <text x="795" y="242" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#94A3B8">specific, proven you looked, not a blast</text>
  <text x="680" y="258" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#FAFAFA">Docs + free tier</text>
  <text x="775" y="258" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#16a34a">✓</text>
  <text x="795" y="258" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#94A3B8">converts better than any landing page</text>

