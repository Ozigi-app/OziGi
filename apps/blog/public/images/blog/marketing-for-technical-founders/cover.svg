  <text x="136" y="108" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#FAFAFA" letter-spacing="1">MARKETING</text>
  <text x="206" y="108" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" letter-spacing="2">·  JUNE 2026</text>

  <text x="80" y="205" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="60" font-weight="800" fill="#FAFAFA">Marketing</text>
  <text x="80" y="275" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="60" font-weight="800" fill="#FAFAFA">for Technical</text>
  <text x="80" y="345" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="60" font-weight="800" fill="#E8320A">Founders</text>

  <text x="80" y="398" font-family="'DM Sans','Inter',sans-serif" font-size="21" fill="#94A3B8">Be useful in public.</text>
  <text x="80" y="424" font-family="'DM Sans','Inter',sans-serif" font-size="21" fill="#94A3B8">Let that earn the attention.</text>

  <line x1="80" y1="452" x2="460" y2="452" stroke="#1E293B" stroke-width="1"/>

  <rect x="80"  y="468" width="120" height="36" rx="18" fill="#1E293B"/>
  <text x="140" y="491" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">dev audience</text>
  <rect x="212" y="468" width="130" height="36" rx="18" fill="#1E293B"/>
  <text x="277" y="491" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">no ads needed</text>
  <rect x="354" y="468" width="100" height="36" rx="18" fill="#1E293B"/>
  <text x="404" y="491" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">weekly loop</text>

  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>

  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>
