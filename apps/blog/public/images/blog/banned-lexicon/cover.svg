<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E8320A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="18%" cy="75%" r="30%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <line x1="580" y1="60"  x2="1160" y2="60"/>
    <line x1="580" y1="150" x2="1160" y2="150"/>
    <line x1="580" y1="240" x2="1160" y2="240"/>
    <line x1="580" y1="330" x2="1160" y2="330"/>
    <line x1="580" y1="420" x2="1160" y2="420"/>
    <line x1="580" y1="510" x2="1160" y2="510"/>
    <line x1="580" y1="600" x2="1160" y2="600"/>
    <line x1="640"  y1="40" x2="640"  y2="590"/>
    <line x1="730"  y1="40" x2="730"  y2="590"/>
    <line x1="820"  y1="40" x2="820"  y2="590"/>
    <line x1="910"  y1="40" x2="910"  y2="590"/>
    <line x1="1000" y1="40" x2="1000" y2="590"/>
    <line x1="1090" y1="40" x2="1090" y2="590"/>
  </g>

  <!-- Circuit traces background -->
  <g fill="none" stroke="#1E2A3F" stroke-width="1.5" opacity="0.5">
    <path d="M820 60 L820 150 L910 150 L910 240"/>
    <path d="M1000 60 L1000 150 L1090 150 L1090 240"/>
    <path d="M640 240 L640 330 L730 330"/>
    <path d="M910 330 L1000 330 L1000 420 L1090 420"/>
    <path d="M640 420 L640 510 L730 510"/>
    <path d="M820 420 L820 510 L910 510"/>
  </g>

  <!-- Banned word tags — the visual centrepiece -->
  <!-- Row 1: struck-through AI slop words -->
  <rect x="640" y="72" width="116" height="32" rx="6" fill="#1E293B"/>
  <text x="698" y="93" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="14" fill="#94A3B8" text-decoration="line-through">delve</text>
  <line x1="655" y1="88" x2="741" y2="88" stroke="#E8320A" stroke-width="1.5"/>

  <rect x="768" y="72" width="130" height="32" rx="6" fill="#1E293B"/>
  <text x="833" y="93" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="14" fill="#94A3B8" text-decoration="line-through">tapestry</text>
  <line x1="783" y1="88" x2="883" y2="88" stroke="#E8320A" stroke-width="1.5"/>

  <rect x="910" y="72" width="114" height="32" rx="6" fill="#1E293B"/>
  <text x="967" y="93" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="14" fill="#94A3B8">robust</text>
  <line x1="925" y1="88" x2="1009" y2="88" stroke="#E8320A" stroke-width="1.5"/>

  <rect x="1036" y="72" width="120" height="32" rx="6" fill="#1E293B"/>
  <text x="1096" y="93" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="14" fill="#94A3B8">pivotal</text>
  <line x1="1051" y1="88" x2="1141" y2="88" stroke="#E8320A" stroke-width="1.5"/>

  <!-- Row 2 -->
  <rect x="640" y="162" width="148" height="32" rx="6" fill="#1E293B"/>
  <text x="714" y="183" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="14" fill="#94A3B8">seamlessly</text>
  <line x1="655" y1="178" x2="773" y2="178" stroke="#E8320A" stroke-width="1.5"/>

  <rect x="800" y="162" width="130" height="32" rx="6" fill="#1E293B"/>
  <text x="865" y="183" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="14" fill="#94A3B8">paradigm</text>
  <line x1="815" y1="178" x2="915" y2="178" stroke="#E8320A" stroke-width="1.5"/>

  <rect x="942" y="162" width="130" height="32" rx="6" fill="#1E293B"/>
  <text x="1007" y="183" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="14" fill="#94A3B8">crucially</text>
  <line x1="957" y1="178" x2="1057" y2="178" stroke="#E8320A" stroke-width="1.5"/>

  <!-- Row 3 — longer phrases -->
  <rect x="640" y="252" width="220" height="32" rx="6" fill="#1E293B"/>
  <text x="750" y="273" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#94A3B8">at its core</text>
  <line x1="655" y1="268" x2="845" y2="268" stroke="#E8320A" stroke-width="1.5"/>

  <rect x="872" y="252" width="280" height="32" rx="6" fill="#1E293B"/>
  <text x="1012" y="273" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#94A3B8">game-changer</text>
  <line x1="887" y1="268" x2="1137" y2="268" stroke="#E8320A" stroke-width="1.5"/>

  <!-- Row 4 -->
  <rect x="640" y="342" width="260" height="32" rx="6" fill="#1E293B"/>
  <text x="770" y="363" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#94A3B8">thought leadership</text>
  <line x1="655" y1="358" x2="885" y2="358" stroke="#E8320A" stroke-width="1.5"/>

  <rect x="912" y="342" width="240" height="32" rx="6" fill="#1E293B"/>
  <text x="1032" y="363" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#94A3B8">cutting-edge</text>
  <line x1="927" y1="358" x2="1137" y2="358" stroke="#E8320A" stroke-width="1.5"/>

  <!-- Row 5: regex patterns — different colour -->
  <rect x="640" y="432" width="290" height="32" rx="6" fill="#0A1628" stroke="#E8320A" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="785" y="453" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#E8320A">**Term:** prefix  →  banned</text>

  <rect x="942" y="432" width="210" height="32" rx="6" fill="#0A1628" stroke="#E8320A" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1047" y="453" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" fill="#E8320A">It's not X. It's Y.</text>

  <!-- Stat callout -->
  <rect x="640" y="490" width="500" height="52" rx="10" fill="#1E293B"/>
  <text x="890" y="511" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#E8320A" letter-spacing="1">PRODUCTION NUMBERS</text>
  <text x="890" y="532" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">~88% clean first pass  ·  ~10% caught on retry  ·  &lt;5ms scan time</text>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>

  <!-- Category badge -->
  <rect x="80" y="90" width="120" height="30" rx="6" fill="#E8320A"/>
  <text x="140" y="110" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#FAFAFA" letter-spacing="1">ENGINEERING</text>
  <text x="214" y="110" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" letter-spacing="2">·  MAY 2026</text>

  <!-- Title -->
  <text x="80" y="196" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#FAFAFA">Stop AI Slop</text>
  <text x="80" y="278" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#E8320A">in Production.</text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">A two-layer validator for LLM output:</text>
  <text x="80" y="362" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">banned lexicon + regex + one retry.</text>

  <!-- Divider -->
  <line x1="80" y1="392" x2="490" y2="392" stroke="#1E293B" stroke-width="1"/>

  <!-- Pills -->
  <rect x="80"  y="408" width="120" height="36" rx="18" fill="#1E293B"/>
  <text x="140" y="431" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">11 min read</text>
  <rect x="212" y="408" width="160" height="36" rx="18" fill="#1E293B"/>
  <text x="292" y="431" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">TypeScript code</text>
  <rect x="384" y="408" width="106" height="36" rx="18" fill="#1E293B"/>
  <text x="437" y="431" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Production</text>

  <!-- Wordmark -->
  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>
</svg>
