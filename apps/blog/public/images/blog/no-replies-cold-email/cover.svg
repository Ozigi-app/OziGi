<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </linearGradient>
    <radialGradient id="glow" cx="74%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.17"/>
      <stop offset="100%" stop-color="#E8320A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="14%" cy="20%" r="32%">
      <stop offset="0%" stop-color="#1E4A8A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <line x1="580" y1="70"  x2="1160" y2="70"/>
    <line x1="580" y1="150" x2="1160" y2="150"/>
    <line x1="580" y1="230" x2="1160" y2="230"/>
    <line x1="580" y1="310" x2="1160" y2="310"/>
    <line x1="580" y1="390" x2="1160" y2="390"/>
    <line x1="580" y1="470" x2="1160" y2="470"/>
    <line x1="580" y1="550" x2="1160" y2="550"/>
    <line x1="630"  y1="40" x2="630"  y2="590"/>
    <line x1="710"  y1="40" x2="710"  y2="590"/>
    <line x1="790"  y1="40" x2="790"  y2="590"/>
    <line x1="870"  y1="40" x2="870"  y2="590"/>
    <line x1="950"  y1="40" x2="950"  y2="590"/>
    <line x1="1030" y1="40" x2="1030" y2="590"/>
    <line x1="1110" y1="40" x2="1110" y2="590"/>
  </g>

  <!-- Diagnostic checklist — 5 causes -->
  <rect x="640" y="76" width="500" height="48" rx="6" fill="#1A2540" stroke="#E8320A" stroke-width="1"/>
  <text x="664" y="97" font-family="'DM Sans','Inter',monospace" font-size="11" font-weight="700" fill="#E8320A" letter-spacing="1">01</text>
  <text x="692" y="97" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#FAFAFA">Emails not reaching the inbox</text>
  <text x="664" y="115" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#94A3B8">Check auth · domain warmup · bounce rate</text>

  <rect x="640" y="136" width="500" height="48" rx="6" fill="#1A2540" stroke="#1E3A5F" stroke-width="1"/>
  <text x="664" y="157" font-family="'DM Sans','Inter',monospace" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">02</text>
  <text x="692" y="157" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#FAFAFA">Writing to the wrong people</text>
  <text x="664" y="175" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#94A3B8">Tighten ICP · score before you send</text>

  <rect x="640" y="196" width="500" height="48" rx="6" fill="#1A2540" stroke="#1E3A5F" stroke-width="1"/>
  <text x="664" y="217" font-family="'DM Sans','Inter',monospace" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">03</text>
  <text x="692" y="217" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#FAFAFA">Message reads like a template</text>
  <text x="664" y="235" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#94A3B8">One true detail · cut filler · be specific</text>

  <rect x="640" y="256" width="500" height="48" rx="6" fill="#0F1828" stroke="#1E293B" stroke-width="1"/>
  <text x="664" y="277" font-family="'DM Sans','Inter',monospace" font-size="11" font-weight="700" fill="#6B7E99" letter-spacing="1">04</text>
  <text x="692" y="277" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#6B7E99">Ask is too big too soon</text>
  <text x="664" y="295" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#4B5E77">Shrink ask to one yes/no question</text>

  <rect x="640" y="316" width="500" height="48" rx="6" fill="#0F1828" stroke="#1E293B" stroke-width="1"/>
  <text x="664" y="337" font-family="'DM Sans','Inter',monospace" font-size="11" font-weight="700" fill="#6B7E99" letter-spacing="1">05</text>
  <text x="692" y="337" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#6B7E99">No follow-up sequence</text>
  <text x="664" y="355" font-family="'DM Sans','Inter',monospace" font-size="11" fill="#4B5E77">Two follow-ups double reply count</text>

  <!-- Reply rate benchmarks -->
  <rect x="640" y="382" width="238" height="64" rx="8" fill="#1A2540"/>
  <text x="759" y="404" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#E8320A" letter-spacing="1">GENERIC BLAST</text>
  <text x="759" y="430" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="26" font-weight="800" fill="#FAFAFA">1–3%</text>
  <text x="759" y="447" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">reply rate</text>

  <text x="898" y="418" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="20" font-weight="800" fill="#E8320A">→</text>

  <rect x="902" y="382" width="238" height="64" rx="8" fill="#1E2D4A" stroke="#E8320A" stroke-width="1"/>
  <text x="1021" y="404" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#E8320A" letter-spacing="1">TARGETED + HUMAN</text>
  <text x="1021" y="430" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="26" font-weight="800" fill="#FAFAFA">8–18%</text>
  <text x="1021" y="447" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">reply rate</text>

  <!-- Circuit traces -->
  <g fill="none" stroke="#1E3A5F" stroke-width="1.5" opacity="0.5">
    <path d="M710 470 L710 550 L790 550"/>
    <path d="M950 470 L950 550 L1030 550 L1030 480"/>
    <path d="M1110 470 L1110 550"/>
  </g>
  <g fill="#E8320A" opacity="0.85"><circle cx="1030" cy="480" r="4"/></g>
  <g fill="none" stroke="#E8320A" stroke-width="1" opacity="0.3"><circle cx="1030" cy="480" r="11"/></g>
  <g fill="#1E3A5F" opacity="0.9">
    <circle cx="790" cy="550" r="4"/>
    <circle cx="1110" cy="550" r="4"/>
  </g>

  <!-- Left side text -->
  <rect x="80" y="88" width="112" height="30" rx="6" fill="#E8320A"/>
  <text x="136" y="108" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#FAFAFA" letter-spacing="1">MARKETING</text>
  <text x="206" y="108" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" letter-spacing="2">·  JUNE 2026</text>

  <text x="80" y="205" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#FAFAFA">No Replies</text>
  <text x="80" y="283" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#FAFAFA">to Your Cold</text>
  <text x="80" y="361" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#E8320A">Emails?</text>

  <text x="80" y="410" font-family="'DM Sans','Inter',sans-serif" font-size="22" fill="#94A3B8">Five causes. Fix them</text>
  <text x="80" y="438" font-family="'DM Sans','Inter',sans-serif" font-size="22" fill="#94A3B8">in order.</text>

  <line x1="80" y1="466" x2="460" y2="466" stroke="#1E293B" stroke-width="1"/>

  <rect x="80"  y="482" width="144" height="36" rx="18" fill="#1E293B"/>
  <text x="152" y="505" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">5 root causes</text>
  <rect x="236" y="482" width="130" height="36" rx="18" fill="#1E293B"/>
  <text x="301" y="505" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">reply benchmarks</text>
  <rect x="378" y="482" width="86" height="36" rx="18" fill="#1E293B"/>
  <text x="421" y="505" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">diagnostic</text>

  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>

  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>
</svg>
