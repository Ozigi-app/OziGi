  <text x="759" y="430" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">reply rate</text>

  <text x="898" y="402" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="20" font-weight="800" fill="#E8320A">→</text>

  <rect x="902" y="368" width="238" height="60" rx="8" fill="#1E2D4A" stroke="#E8320A" stroke-width="1"/>
  <text x="1021" y="390" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#E8320A" letter-spacing="1">PERSONALIZED</text>
  <text x="1021" y="413" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="22" font-weight="800" fill="#FAFAFA">~18%</text>
  <text x="1021" y="430" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">reply rate</text>

