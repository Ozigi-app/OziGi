  <text x="206" y="108" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" letter-spacing="2">·  JUNE 2026</text>

  <text x="80" y="200" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="66" font-weight="800" fill="#FAFAFA">Cold Email</text>
  <text x="80" y="278" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="66" font-weight="800" fill="#FAFAFA">That Sounds</text>
  <text x="80" y="356" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="66" font-weight="800" fill="#E8320A">Human</text>

  <text x="80" y="410" font-family="'DM Sans','Inter',sans-serif" font-size="23" fill="#94A3B8">Ban the filler. Write from</text>
