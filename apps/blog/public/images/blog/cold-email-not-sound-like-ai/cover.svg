  <rect x="640" y="232" width="500" height="120" rx="8" fill="#0F1828" stroke="#1E3A5F" stroke-width="1"/>
  <text x="660" y="254" font-family="'DM Sans','Inter',monospace" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">HUMAN VERSION</text>
  <text x="660" y="278" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Subject: your rate-limiting issue on the api client</text>
  <text x="660" y="302" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8">Hi Sam, I saw your open issue about rate limiting</text>
  <text x="660" y="320" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8">on your TypeScript client. We hit the same wall</text>
  <text x="660" y="338" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8">last year. Happy to share what worked. No pitch.</text>

