  <text x="1052" y="101" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#94A3B8">I wanted to reach out</text>
  <line x1="979" y1="96" x2="1125" y2="96" stroke="#E8320A" stroke-width="1.5"/>

  <!-- Row 2: filler words -->
  <rect x="640" y="124" width="120" height="32" rx="6" fill="#1E293B"/>
  <text x="700" y="145" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#94A3B8">robust</text>
