<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0A1A2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="50%" r="44%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <line x1="580" y1="70"  x2="1160" y2="70"/>
    <line x1="580" y1="160" x2="1160" y2="160"/>
    <line x1="580" y1="250" x2="1160" y2="250"/>
    <line x1="580" y1="340" x2="1160" y2="340"/>
    <line x1="580" y1="430" x2="1160" y2="430"/>
    <line x1="580" y1="520" x2="1160" y2="520"/>
    <line x1="640"  y1="40" x2="640"  y2="590"/>
    <line x1="730"  y1="40" x2="730"  y2="590"/>
    <line x1="820"  y1="40" x2="820"  y2="590"/>
    <line x1="910"  y1="40" x2="910"  y2="590"/>
    <line x1="1000" y1="40" x2="1000" y2="590"/>
    <line x1="1090" y1="40" x2="1090" y2="590"/>
  </g>

  <!-- Circuit traces -->
  <g fill="none" stroke="#1E2A3F" stroke-width="1.5" opacity="0.5">
    <path d="M820 70 L820 160 L910 160 L910 250"/>
    <path d="M1000 70 L1000 160 L1090 160 L1090 250"/>
    <path d="M640 250 L640 340 L730 340"/>
    <path d="M910 340 L1000 340 L1000 430 L1090 430"/>
    <path d="M730 430 L730 520 L820 520"/>
  </g>
  <g fill="#1E3A5F" opacity="0.8">
    <circle cx="820"  cy="160" r="4"/>
    <circle cx="1000" cy="160" r="4"/>
    <circle cx="730"  cy="340" r="4"/>
    <circle cx="820"  cy="520" r="4"/>
  </g>
  <g fill="#F59E0B" opacity="0.8">
    <circle cx="910"  cy="250" r="5"/>
    <circle cx="1090" cy="250" r="5"/>
    <circle cx="1090" cy="430" r="5"/>
  </g>
  <g fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.25">
    <circle cx="910"  cy="250" r="13"/>
    <circle cx="1090" cy="250" r="13"/>
    <circle cx="1090" cy="430" r="13"/>
  </g>

  <!-- Challenger badges -->
  <rect x="640" y="82"  width="110" height="36" rx="8" fill="#1E293B" stroke="#1E3A5F" stroke-width="1"/>
  <text x="695" y="105" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="14" fill="#94A3B8">Beehiiv</text>
  <rect x="762" y="82"  width="110" height="36" rx="8" fill="#1E293B" stroke="#1E3A5F" stroke-width="1"/>
  <text x="817" y="105" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="14" fill="#94A3B8">Substack</text>
  <rect x="884" y="82"  width="80"  height="36" rx="8" fill="#1E293B" stroke="#1E3A5F" stroke-width="1"/>
  <text x="924" y="105" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="14" fill="#94A3B8">Kit</text>

  <!-- Key distinction callout -->
  <rect x="640" y="138" width="520" height="56" rx="10" fill="#1E293B"/>
  <rect x="640" y="138" width="5"   height="56" rx="2" fill="#F59E0B"/>
  <text x="662" y="162" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#F59E0B" letter-spacing="1">THE REAL QUESTION</text>
  <text x="662" y="182" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Beehiiv / Substack / Kit send your newsletter. Who actually writes it?</text>

  <!-- Ozigi winner card -->
  <rect x="640" y="212" width="520" height="64" rx="10" fill="#1E293B" stroke="#E8320A" stroke-width="1.5"/>
  <rect x="640" y="212" width="5"   height="64" rx="2" fill="#E8320A"/>
  <text x="662" y="238" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="1">OZIGI</text>
  <text x="662" y="258" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Writes the newsletter. Doesn't just send it.</text>
  <text x="662" y="272" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Multimodal input  ·  Personas  ·  Slop-free output</text>

  <!-- Three comparison rows -->
  <rect x="640" y="294" width="520" height="44" rx="6" fill="#0A1628" stroke="#1E293B" stroke-width="1"/>
  <text x="656" y="311" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">WRITES DRAFT FROM SCRATCH</text>
  <text x="656" y="327" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Beehiiv / Substack / Kit</text>
  <rect x="950" y="300" width="90" height="24" rx="6" fill="#1E293B"/>
  <text x="995" y="316" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">You write it</text>
  <rect x="1052" y="300" width="94" height="24" rx="6" fill="#E8320A" opacity="0.15" stroke="#E8320A" stroke-width="1"/>
  <text x="1099" y="316" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#E8320A">Ozigi: Yes</text>

  <rect x="640" y="346" width="520" height="44" rx="6" fill="#0A1628" stroke="#1E293B" stroke-width="1"/>
  <text x="656" y="363" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">PERSONA-AWARE VOICE</text>
  <text x="656" y="379" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Beehiiv / Substack / Kit</text>
  <rect x="950" y="352" width="90" height="24" rx="6" fill="#1E293B"/>
  <text x="995" y="368" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">None</text>
  <rect x="1052" y="352" width="94" height="24" rx="6" fill="#E8320A" opacity="0.15" stroke="#E8320A" stroke-width="1"/>
  <text x="1099" y="368" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#E8320A">Ozigi: Built-in</text>

  <rect x="640" y="398" width="520" height="44" rx="6" fill="#0A1628" stroke="#1E293B" stroke-width="1"/>
  <text x="656" y="415" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">AI SLOP DETECTION</text>
  <text x="656" y="431" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Beehiiv / Substack / Kit</text>
  <rect x="950" y="404" width="90" height="24" rx="6" fill="#1E293B"/>
  <text x="995" y="420" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">None</text>
  <rect x="1052" y="404" width="94" height="24" rx="6" fill="#E8320A" opacity="0.15" stroke="#E8320A" stroke-width="1"/>
  <text x="1099" y="420" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#E8320A">Ozigi: Yes</text>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>

  <!-- Category -->
  <text x="80" y="118" font-family="'DM Sans','Inter',sans-serif" font-size="14" font-weight="600" fill="#E8320A" letter-spacing="3">TOOLS ROUNDUP  ·  2026</text>

  <!-- Title -->
  <text x="80" y="205" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="56" font-weight="800" fill="#FAFAFA">Ozigi vs</text>
  <text x="80" y="273" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="56" font-weight="800" fill="#FAFAFA">Beehiiv, Substack</text>
  <text x="80" y="341" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="56" font-weight="800" fill="#F59E0B">&amp; Kit.</text>

  <!-- Subtitle -->
  <text x="80" y="390" font-family="'DM Sans','Inter',sans-serif" font-size="20" fill="#94A3B8">Which tool actually writes</text>
  <text x="80" y="416" font-family="'DM Sans','Inter',sans-serif" font-size="20" fill="#94A3B8">the newsletter — not just sends it?</text>

  <line x1="80" y1="444" x2="460" y2="444" stroke="#1E293B" stroke-width="1"/>

  <rect x="80"  y="460" width="130" height="36" rx="18" fill="#1E293B"/>
  <text x="145" y="483" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Tools Roundup</text>
  <rect x="222" y="460" width="140" height="36" rx="18" fill="#1E293B"/>
  <text x="292" y="483" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Newsletter focus</text>

  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>
</svg>
