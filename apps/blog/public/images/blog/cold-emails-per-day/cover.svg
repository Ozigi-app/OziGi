<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </linearGradient>
    <radialGradient id="glow" cx="73%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#E8320A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="22%" r="30%">
      <stop offset="0%" stop-color="#1E4A8A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.45">
    <line x1="580" y1="70"  x2="1160" y2="70"/>
    <line x1="580" y1="160" x2="1160" y2="160"/>
    <line x1="580" y1="250" x2="1160" y2="250"/>
    <line x1="580" y1="340" x2="1160" y2="340"/>
    <line x1="580" y1="430" x2="1160" y2="430"/>
    <line x1="580" y1="520" x2="1160" y2="520"/>
    <line x1="632"  y1="40" x2="632"  y2="590"/>
    <line x1="712"  y1="40" x2="712"  y2="590"/>
    <line x1="792"  y1="40" x2="792"  y2="590"/>
    <line x1="872"  y1="40" x2="872"  y2="590"/>
    <line x1="952"  y1="40" x2="952"  y2="590"/>
    <line x1="1032" y1="40" x2="1032" y2="590"/>
    <line x1="1112" y1="40" x2="1112" y2="590"/>
  </g>

  <!-- Per-inbox bar chart visual -->
  <!-- Y axis label -->
  <text x="650" y="96" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">DAILY COLD EMAILS (PER INBOX)</text>

  <!-- Chart baseline -->
  <line x1="670" y1="420" x2="1140" y2="420" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Bar: new domain (10-20) -->
  <rect x="690" y="360" width="72" height="60" rx="4" fill="#1A2540" stroke="#1E3A5F" stroke-width="1"/>
  <text x="726" y="350" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#6B7E99">10–20</text>
  <text x="726" y="440" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#6B7E99">new</text>
  <text x="726" y="453" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#6B7E99">domain</text>

  <!-- Bar: week 2 warmup -->
  <rect x="782" y="295" width="72" height="125" rx="4" fill="#1A2540" stroke="#1E3A5F" stroke-width="1"/>
  <text x="818" y="285" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#94A3B8">10–15</text>
  <text x="818" y="440" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#6B7E99">warmup</text>
  <text x="818" y="453" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#6B7E99">wk 2</text>

  <!-- Bar: week 3 -->
  <rect x="874" y="235" width="72" height="185" rx="4" fill="#1E2D4A" stroke="#1E3A5F" stroke-width="1"/>
  <text x="910" y="225" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#94A3B8">20–30</text>
  <text x="910" y="440" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#6B7E99">warmup</text>
  <text x="910" y="453" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#6B7E99">wk 3</text>

  <!-- Bar: warmed (highlighted) -->
  <rect x="966" y="145" width="72" height="275" rx="4" fill="#E8320A" opacity="0.85"/>
  <text x="1002" y="135" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="13" font-weight="800" fill="#FAFAFA">20–50</text>
  <text x="1002" y="440" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#FAFAFA">warmed</text>
  <text x="1002" y="453" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#FAFAFA">mailbox</text>

  <!-- Danger zone line -->
  <line x1="670" y1="115" x2="1140" y2="115" stroke="#E8320A" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>
  <text x="1135" y="112" text-anchor="end" font-family="'DM Sans','Inter',monospace" font-size="10" fill="#E8320A" opacity="0.6">50+ = risk</text>

  <!-- "Per inbox not per domain" callout -->
  <rect x="632" y="470" width="508" height="52" rx="8" fill="#1E2D4A" stroke="#E8320A" stroke-width="1"/>
  <text x="886" y="491" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#E8320A" letter-spacing="1">KEY DISTINCTION</text>
  <text x="886" y="511" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="14" fill="#FAFAFA">This limit is per inbox — not per domain, not per day total</text>

  <!-- Circuit traces -->
  <g fill="none" stroke="#1E3A5F" stroke-width="1.5" opacity="0.5">
    <path d="M712 530 L712 590 L792 590"/>
    <path d="M1032 530 L1032 590 L1112 590"/>
  </g>
  <g fill="#E8320A" opacity="0.85"><circle cx="792" cy="590" r="4"/></g>
  <g fill="none" stroke="#E8320A" stroke-width="1" opacity="0.3"><circle cx="792" cy="590" r="10"/></g>
  <g fill="#1E3A5F" opacity="0.9"><circle cx="1112" cy="590" r="4"/></g>

  <!-- Left side text -->
  <rect x="80" y="88" width="112" height="30" rx="6" fill="#E8320A"/>
  <text x="136" y="108" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#FAFAFA" letter-spacing="1">MARKETING</text>
  <text x="206" y="108" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" letter-spacing="2">·  JUNE 2026</text>

  <text x="80" y="200" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="64" font-weight="800" fill="#FAFAFA">How Many</text>
  <text x="80" y="276" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="64" font-weight="800" fill="#FAFAFA">Cold Emails</text>
  <text x="80" y="352" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="64" font-weight="800" fill="#E8320A">Per Day?</text>

  <text x="80" y="406" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">20–50 per inbox.</text>
  <text x="80" y="438" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">Not per domain.</text>

  <line x1="80" y1="468" x2="460" y2="468" stroke="#1E293B" stroke-width="1"/>

  <rect x="80"  y="484" width="152" height="36" rx="18" fill="#1E293B"/>
  <text x="156" y="507" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">per-inbox rule</text>
  <rect x="244" y="484" width="150" height="36" rx="18" fill="#1E293B"/>
  <text x="319" y="507" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">0.1% spam cap</text>
  <rect x="406" y="484" width="80" height="36" rx="18" fill="#1E293B"/>
  <text x="446" y="507" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">scale up</text>

  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>

  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>
</svg>
