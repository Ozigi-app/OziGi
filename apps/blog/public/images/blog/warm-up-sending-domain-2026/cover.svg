<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </linearGradient>
    <radialGradient id="glow" cx="73%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#E8320A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="22%" r="30%">
      <stop offset="0%" stop-color="#1E4A8A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.45">
    <line x1="580" y1="70"  x2="1160" y2="70"/>
    <line x1="580" y1="160" x2="1160" y2="160"/>
    <line x1="580" y1="250" x2="1160" y2="250"/>
    <line x1="580" y1="340" x2="1160" y2="340"/>
    <line x1="580" y1="430" x2="1160" y2="430"/>
    <line x1="580" y1="520" x2="1160" y2="520"/>
    <line x1="632"  y1="40" x2="632"  y2="590"/>
    <line x1="720"  y1="40" x2="720"  y2="590"/>
    <line x1="808"  y1="40" x2="808"  y2="590"/>
    <line x1="896"  y1="40" x2="896"  y2="590"/>
    <line x1="984"  y1="40" x2="984"  y2="590"/>
    <line x1="1072" y1="40" x2="1072" y2="590"/>
    <line x1="1140" y1="40" x2="1140" y2="590"/>
  </g>

  <!-- 4-week ramp visual -->
  <text x="650" y="94" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">4-WEEK WARMUP RAMP</text>

  <!-- Ramp staircase -->
  <!-- Week 1 -->
  <rect x="648" y="370" width="106" height="50" rx="4" fill="#1A2540" stroke="#1E3A5F" stroke-width="1"/>
  <text x="701" y="390" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#6B7E99">WK 1</text>
  <text x="701" y="410" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#94A3B8">~5/day</text>

  <!-- Week 2 -->
  <rect x="762" y="310" width="106" height="110" rx="4" fill="#1A2540" stroke="#1E3A5F" stroke-width="1"/>
  <text x="815" y="330" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#6B7E99">WK 2</text>
  <text x="815" y="350" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#94A3B8">~10–15/day</text>

  <!-- Week 3 -->
  <rect x="876" y="230" width="106" height="190" rx="4" fill="#1E2D4A" stroke="#1E3A5F" stroke-width="1"/>
  <text x="929" y="250" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#94A3B8">WK 3</text>
  <text x="929" y="270" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="13" fill="#FAFAFA">~20–30/day</text>
  <text x="929" y="290" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#E8320A">light cold starts</text>

  <!-- Week 4 (highlighted) -->
  <rect x="990" y="130" width="130" height="290" rx="4" fill="#E8320A" opacity="0.85"/>
  <text x="1055" y="152" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#FAFAFA">WK 4</text>
  <text x="1055" y="174" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="14" font-weight="800" fill="#FAFAFA">~40–50/day</text>
  <text x="1055" y="194" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="10" fill="#FAFAFA">real outreach</text>

  <!-- Ramp connecting line -->
  <polyline points="701,370 815,310 929,230 1055,130" fill="none" stroke="#E8320A" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Auth record tags below chart -->
  <rect x="648" y="444" width="74" height="28" rx="6" fill="#1E293B"/>
  <text x="685" y="462" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#FAFAFA">SPF</text>

  <rect x="732" y="444" width="80" height="28" rx="6" fill="#1E293B"/>
  <text x="772" y="462" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#FAFAFA">DKIM</text>

  <rect x="822" y="444" width="96" height="28" rx="6" fill="#1E293B"/>
  <text x="870" y="462" text-anchor="middle" font-family="'DM Sans','Inter',monospace" font-size="12" font-weight="700" fill="#FAFAFA">DMARC</text>

  <text x="932" y="462" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#6B7E99">→ set up first, before day 1</text>

  <!-- Never stop warmup callout -->
  <rect x="648" y="486" width="472" height="48" rx="8" fill="#1E2D4A" stroke="#E8320A" stroke-width="1"/>
  <text x="884" y="506" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="700" fill="#E8320A" letter-spacing="1">PERMANENT BASELINE</text>
  <text x="884" y="524" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Keep 30–40% warmup running after launch — never stop</text>

  <!-- Circuit traces -->
  <g fill="none" stroke="#1E3A5F" stroke-width="1.5" opacity="0.5">
    <path d="M720 545 L720 590 L808 590"/>
    <path d="M1072 545 L1072 590 L1140 590"/>
  </g>
  <g fill="#E8320A" opacity="0.85"><circle cx="808" cy="590" r="4"/></g>
  <g fill="none" stroke="#E8320A" stroke-width="1" opacity="0.3"><circle cx="808" cy="590" r="10"/></g>
  <g fill="#1E3A5F" opacity="0.9"><circle cx="1140" cy="590" r="4"/></g>

  <!-- Left side text -->
  <rect x="80" y="88" width="112" height="30" rx="6" fill="#E8320A"/>
  <text x="136" y="108" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#FAFAFA" letter-spacing="1">MARKETING</text>
  <text x="206" y="108" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" letter-spacing="2">·  JUNE 2026</text>

  <text x="80" y="200" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#FAFAFA">Warm Up a</text>
  <text x="80" y="280" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#FAFAFA">Sending</text>
  <text x="80" y="360" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#E8320A">Domain</text>

  <text x="80" y="414" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">Four weeks. Then never</text>
  <text x="80" y="446" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">stop the baseline.</text>

  <line x1="80" y1="475" x2="460" y2="475" stroke="#1E293B" stroke-width="1"/>

  <rect x="80"  y="490" width="120" height="36" rx="18" fill="#1E293B"/>
  <text x="140" y="513" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">4-wk ramp</text>
  <rect x="212" y="490" width="150" height="36" rx="18" fill="#1E293B"/>
  <text x="287" y="513" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">SPF DKIM DMARC</text>
  <rect x="374" y="490" width="106" height="36" rx="18" fill="#1E293B"/>
  <text x="427" y="513" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">9 min read</text>

  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>

  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>
</svg>
